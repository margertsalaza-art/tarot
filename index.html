<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔮 粉晶塔罗 · 命运指引</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: radial-gradient(ellipse at top, #2d1b4e 0%, #1a0f2e 50%, #0d0618 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* 星空背景粒子 */
#particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

.particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: rgba(255, 182, 193, 0.6);
    border-radius: 50%;
    animation: float 8s infinite ease-in-out;
    box-shadow: 0 0 6px rgba(255, 182, 193, 0.4);
}

@keyframes float {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
    50% { transform: translateY(-30px) scale(1.2); opacity: 0.8; }
}

/* 主容器 */
.container {
    position: relative;
    z-index: 1;
    max-width: 500px;
    margin: 0 auto;
    padding: 20px 16px 40px;
}

/* 标题 */
h1 {
    text-align: center;
    font-size: 28px;
    margin: 20px 0 8px;
    background: linear-gradient(135deg, #ffd0e8, #ff7ac6, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    font-weight: 700;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    color: rgba(255, 208, 232, 0.7);
    margin-bottom: 24px;
}

/* 步骤指示器 */
.step-indicator {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
}

.step-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    transition: all 0.4s ease;
    border: 2px solid rgba(255, 255, 255, 0.1);
}

.step-dot.active {
    background: linear-gradient(135deg, #ff7ac6, #a855f7);
    border-color: rgba(255, 122, 198, 0.5);
    box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
    transform: scale(1.2);
}

/* 面板 */
.panel {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.panel-title {
    text-align: center;
    font-size: 17px;
    color: #ffd0e8;
    margin-bottom: 18px;
    font-weight: 600;
}

/* 牌阵选择 */
.spread-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.spread-btn {
    background: rgba(255, 255, 255, 0.06);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 18px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}

.spread-btn:hover, .spread-btn.selected {
    background: rgba(255, 122, 198, 0.15);
    border-color: rgba(255, 122, 198, 0.4);
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(168, 85, 247, 0.2);
}

.spread-icon {
    font-size: 32px;
    margin-bottom: 4px;
}

.spread-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
}

.spread-desc {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.5;
}

/* 主题选择 */
.topic-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
}

.topic-btn {
    background: rgba(255, 255, 255, 0.06);
    border: 1.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.8);
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
}

.topic-btn:hover, .topic-btn.selected {
    background: linear-gradient(135deg, rgba(255, 122, 198, 0.3), rgba(168, 85, 247, 0.3));
    border-color: rgba(255, 122, 198, 0.5);
    color: #fff;
    transform: scale(1.05);
}

.custom-input input {
    width: 100%;
    background: rgba(255, 255, 255, 0.06);
    border: 1.5px solid rgba(255, 255, 255, 0.15);
    border-radius: 14px;
    padding: 14px 16px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 14px;
    outline: none;
    transition: all 0.3s ease;
}

.custom-input input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

.custom-input input:focus {
    border-color: rgba(255, 122, 198, 0.5);
    background: rgba(255, 255, 255, 0.08);
}

/* 按钮 */
.action-btn, .shuffle-btn, .draw-deck {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #ff7ac6, #a855f7);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
    position: relative;
    overflow: hidden;
}

.action-btn:hover:not(:disabled), .shuffle-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(168, 85, 247, 0.5);
}

.action-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
}

/* 洗牌区域 */
.shuffle-area, .cut-area, .draw-area, .spread-display, .reading-section {
    display: none;
    animation: fadeIn 0.6s ease;
}

.shuffle-area.active, .cut-area.active, .draw-area.active, .spread-display.active, .reading-section.active {
    display: block;
}

.shuffle-text, .cut-text, .draw-instruction {
    text-align: center;
    font-size: 15px;
    color: #ffd0e8;
    margin-bottom: 20px;
    min-height: 24px;
    transition: all 0.3s ease;
}

/* 牌堆容器 */
.deck-container {
    display: flex;
    justify-content: center;
    gap: -20px;
    margin: 30px 0;
    perspective: 1000px;
}

.deck-card {
    width: 80px;
    height: 130px;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 8px 30px rgba(236, 72, 153, 0.3);
    margin-left: -30px;
    transition: all 0.3s ease;
    border: 2px solid rgba(255, 255, 255, 0.2);
    position: relative;
    overflow: hidden;
}

.deck-card:first-child {
    margin-left: 0;
}

.deck-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: rotate(25deg);
    animation: shimmer 3s infinite;
}

@keyframes shimmer {
    0% { transform: translateX(-100%) rotate(25deg); }
    100% { transform: translateX(100%) rotate(25deg); }
}

.deck-card.shuffling {
    animation: shuffleAnim 0.6s ease-in-out;
}

@keyframes shuffleAnim {
    0%, 100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-15px) rotate(-8deg); }
    50% { transform: translateX(15px) rotate(8deg); }
    75% { transform: translateX(-8px) rotate(-4deg); }
}

.shuffle-count {
    text-align: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 12px;
}

/* 切牌区域 */
.cut-deck {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 30px 0;
}

.cut-pile {
    width: 100px;
    height: 150px;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    cursor: pointer;
    transition: all 0.4s ease;
    border: 2px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 25px rgba(236, 72, 153, 0.3);
    position: relative;
    overflow: hidden;
}

.cut-pile:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 12px 35px rgba(236, 72, 153, 0.5);
    border-color: rgba(255, 255, 255, 0.4);
}

.cut-pile.selected {
    transform: translateY(-12px) scale(1.08);
    box-shadow: 0 15px 40px rgba(255, 122, 198, 0.6);
    border-color: #ff7ac6;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 15px 40px rgba(255, 122, 198, 0.6); }
    50% { box-shadow: 0 15px 50px rgba(255, 122, 198, 0.8); }
}

.cut-or {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 600;
}

/* 抽牌区域 */
.draw-progress {
    text-align: center;
    font-size: 14px;
    color: rgba(255, 208, 232, 0.8);
    margin-bottom: 16px;
    font-weight: 500;
}

.draw-deck {
    width: 120px;
    height: 180px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: floatDeck 3s ease-in-out infinite;
    border: 2px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 0 40px rgba(236, 72, 153, 0.4);
}

@keyframes floatDeck {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

.draw-deck:hover {
    transform: scale(1.08);
    box-shadow: 0 0 50px rgba(236, 72, 153, 0.6);
}

.draw-deck .remaining {
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-size: 12px;
    background: rgba(0,0,0,0.3);
    padding: 2px 8px;
    border-radius: 10px;
    color: rgba(255,255,255,0.8);
}

.drawn-cards-display {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
    min-height: 60px;
}

.drawn-card-mini {
    width: 50px;
    height: 70px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.15);
    animation: miniAppear 0.4s ease;
}

.drawn-card-mini.reversed {
    transform: rotate(180deg);
}

@keyframes miniAppear {
    from { transform: scale(0) rotateY(90deg); opacity: 0; }
    to { transform: scale(1) rotateY(0); opacity: 1; }
}

.mini-emoji {
    font-size: 22px;
}

.mini-name {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.7);
    margin-top: 2px;
}

/* 牌阵展示 */
.spread-display {
    text-align: center;
}

.spread-3-layout {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 24px 0;
    flex-wrap: wrap;
}

.spread-6-layout {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 12px;
    margin: 24px auto;
    max-width: 340px;
    min-height: 400px;
    place-items: center;
}

.final-card {
    width: 95px;
    position: relative;
    animation: cardAppear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.final-card.reversed .card-frame {
    transform: rotate(180deg);
}

@keyframes cardAppear {
    from { transform: scale(0.5) rotateY(90deg); opacity: 0; }
    to { transform: scale(1) rotateY(0); opacity: 1; }
}

.card-frame {
    width: 95px;
    height: 155px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    transition: all 0.3s ease;
}

.card-emoji {
    font-size: 40px;
    margin-bottom: 8px;
}

.card-info {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    text-align: center;
}

.position-tag {
    margin-top: 10px;
    font-size: 11px;
    color: #ffd0e8;
    background: rgba(255, 122, 198, 0.15);
    padding: 4px 10px;
    border-radius: 12px;
    display: inline-block;
    border: 1px solid rgba(255, 122, 198, 0.2);
}

/* 解读区域 */
.reading-section {
    animation: fadeIn 0.8s ease;
}

.reading-title {
    text-align: center;
    font-size: 20px;
    color: #ffd0e8;
    margin-bottom: 20px;
    font-weight: 600;
}

.card-reading {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
    animation: slideUp 0.6s ease;
    animation-fill-mode: both;
}

.card-reading:nth-child(1) { animation-delay: 0.1s; }
.card-reading:nth-child(2) { animation-delay: 0.2s; }
.card-reading:nth-child(3) { animation-delay: 0.3s; }
.card-reading:nth-child(4) { animation-delay: 0.4s; }
.card-reading:nth-child(5) { animation-delay: 0.5s; }
.card-reading:nth-child(6) { animation-delay: 0.6s; }

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.reading-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.reading-card-emoji {
    font-size: 36px;
    flex-shrink: 0;
}

.reading-card-info h3 {
    font-size: 16px;
    color: #fff;
    margin-bottom: 4px;
}

.position-name {
    font-size: 12px;
    color: #ffd0e8;
    margin-bottom: 4px;
}

.card-keyword {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.6);
}

.reading-content {
    font-size: 14px;
    line-height: 1.8;
    color: rgba(255, 255, 255, 0.85);
}

.reading-content p {
    margin-bottom: 8px;
}

.highlight {
    color: #ffd0e8;
    font-weight: 600;
}

.summary-reading {
    background: linear-gradient(135deg, rgba(255, 122, 198, 0.1), rgba(168, 85, 247, 0.1));
    border: 1.5px solid rgba(255, 122, 198, 0.2);
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
    font-size: 14px;
    line-height: 1.9;
    color: rgba(255, 255, 255, 0.9);
    animation: fadeIn 1s ease 0.8s both;
}

.summary-reading h3 {
    text-align: center;
    color: #ffd0e8;
    margin-bottom: 12px;
    font-size: 16px;
}

.bottom-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
}

.secondary-btn {
    flex: 1;
    padding: 14px;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s ease;
}

.secondary-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 122, 198, 0.4);
    transform: translateY(-2px);
}

/* 响应式 */
@media (max-width: 380px) {
    .topic-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    .spread-grid {
        grid-template-columns: 1fr;
    }
    .spread-3-layout {
        gap: 8px;
    }
    .final-card, .card-frame {
        width: 85px;
        height: 140px;
    }
    .card-emoji {
        font-size: 32px;
    }
}

/* 扇形牌堆 - 双扇区 */
.fan-deck {
    position: relative;
    width: 100%;
    height: 340px;
    margin: 10px 0;
    overflow: visible;
}

.fan-row {
    position: absolute;
    width: 100%;
    height: 160px;
    left: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
}

.fan-row-top {
    bottom: 140px;
    z-index: 10;
}

.fan-row-bottom {
    bottom: 10px;
    z-index: 20;
}

.fan-card {
    position: absolute;
    width: 72px;
    height: 118px;
    background: linear-gradient(160deg, #6d28d9 0%, #be185d 50%, #7c3aed 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 2px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    bottom: 0;
    transform-origin: bottom center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    will-change: transform;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                box-shadow 0.2s ease,
                filter 0.2s ease;
}

.fan-card::after {
    content: '🌸';
    font-size: 28px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

/* 斗地主式hover - 只抬起 */
.fan-card:hover {
    transform: var(--base-transform) translateY(-18px) !important;
    box-shadow: 0 12px 35px rgba(236, 72, 153, 0.6), 0 0 0 3px rgba(255, 122, 198, 0.5) !important;
    filter: brightness(1.2);
    z-index: 200 !important;
}

/* 移动端touch效果 */
.fan-card.touch-hover {
    transform: var(--base-transform) translateY(-18px) !important;
    box-shadow: 0 12px 35px rgba(236, 72, 153, 0.6), 0 0 0 3px rgba(255, 122, 198, 0.5) !important;
    filter: brightness(1.2);
    z-index: 200 !important;
}

.fan-card.selected {
    animation: cardFlyOut 0.5s ease forwards;
    pointer-events: none;
}

@keyframes cardFlyOut {
    0% { transform: var(--base-transform); opacity: 1; }
    40% { transform: var(--base-transform) translateY(-60px) scale(1.05); opacity: 1; }
    100% { transform: var(--base-transform) translateY(-140px) scale(0.4); opacity: 0; }
}

.fan-card.shimmer {
    animation: fanShimmer 0.4s ease;
}

@keyframes fanShimmer {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
}

/* 特殊动画 */
.magic-sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    animation: sparkleFly 1.5s ease-out forwards;
    z-index: 100;
}

@keyframes sparkleFly {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
}

/* 隐藏滚动条但保持滚动 */
::-webkit-scrollbar {
    width: 0;
    height: 0;
}
</style>
<base target="_blank">
</head>
<body>

<div id="particles"></div>

<div class="container">
<h1>🔮 粉晶塔罗</h1>
<div class="subtitle">命运正在回应你的内心</div>

<div class="step-indicator" id="stepIndicator">
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
</div>

<!-- 步骤1: 选择牌阵 -->
<div class="panel" id="step1">
    <div class="panel-title">✨ 选择牌阵 ✨</div>
    <div class="spread-grid">
        <div class="spread-btn" data-spread="3" onclick="selectSpread(3)">
            <span class="spread-icon">🌙</span>
            <span class="spread-name">三张牌阵</span>
            <span class="spread-desc">过去 · 现在 · 未来<br>适合快速指引</span>
        </div>
        <div class="spread-btn" data-spread="6" onclick="selectSpread(6)">
            <span class="spread-icon">⭐</span>
            <span class="spread-name">凯尔特十字</span>
            <span class="spread-desc">六张深度解读<br>全面分析问题</span>
        </div>
    </div>
</div>

<!-- 步骤2: 选择主题 -->
<div class="panel" id="step2" style="display: none;">
    <div class="panel-title">💫 选择你关心的领域 💫</div>

// ========== 工具函数 ==========
function shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function createSparkles(x, y) {
    const emojis = ['✨', '💫', '🌟', '⭐', '💖', '🔮'];
    for (let i = 0; i < 10; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'magic-sparkle';
        sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        sparkle.style.left = x + 'px';
        sparkle.style.top = y + 'px';
        const angle = (Math.PI * 2 * i) / 10;
        const distance = 60 + Math.random() * 80;
        sparkle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
        sparkle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1500);
    }
}

function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
}

// ========== 初始化 ==========

    const container = document.getElementById('particles');

        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (6 + Math.random() * 6) + 's';
        p.style.width = (2 + Math.random() * 3) + 'px';
        p.style.height = p.style.width;
        container.appendChild(p);
    }
}

    document.getElementById('shuffleBtn').style.display = 'block';

    document.getElementById('shuffleCount').textContent = '已洗牌 0 次，你可以继续洗牌或随时进入切牌';
    document.getElementById('shuffleText').textContent = '✨ 请将注意力集中在你的问题上 ✨';
}

function shuffleDeck() {
    const cards = document.querySelectorAll('.deck-card');
    const btn = document.getElementById('shuffleBtn');
    const count = document.getElementById('shuffleCount');
    const text = document.getElementById('shuffleText');
    const cutBtn = document.getElementById('cutBtn');

    cards.forEach(c => {
        c.classList.remove('shuffling');
        void c.offsetWidth;
        c.classList.add('shuffling');
    });
    btn.disabled = true;
    vibrate(60);
    playShuffleSound();

    deck = shuffleArray(deck);
    shuffleCount++;

    setTimeout(() => {
        cards.forEach(c => c.classList.remove('shuffling'));
        btn.disabled = false;

        const texts = [
            '✨ 感受牌的能量流动 ✨',
            '✨ 将你的意念注入牌中 ✨',

            '✨ 直觉正在觉醒 ✨'
        ];

        count.textContent = `已洗牌 ${shuffleCount} 次，随时可以进入切牌`;
        text.textContent = texts[shuffleCount % texts.length];

        // 显示切牌按钮

            text.textContent = '✨ 能量已充分激活，随时可以进入切牌 ✨';

function selectCutPile(pile) {
    cutPile = pile;
    document.querySelectorAll('.cut-pile').forEach((p, i) => {
        p.classList.toggle('selected', i === pile);
    });
    vibrate([80, 40]);

    const rect = document.querySelector('.cut-pile.selected').getBoundingClientRect();
    createSparkles(rect.left + rect.width/2, rect.top + rect.height/2);

    if (pile === 1) {
        const half = Math.floor(deck.length / 2);
        deck = [...deck.slice(half), ...deck.slice(0, half)];

function goToDraw() {
    document.getElementById('drawArea').classList.add('active');
    updateStep(4);
    vibrate(50);

    drawnCards = [];
    document.getElementById('drawProgress').textContent = `已选 0 / ${selectedSpread} 张`;
    document.getElementById('drawInstruction').textContent = '✨ 心中默念你的问题，从扇形牌中选择你要的牌 ✨';
    document.getElementById('drawnCardsDisplay').innerHTML = '';

    renderFanDeck();
}

function renderFanDeck() {
    const fanDeck = document.getElementById('fanDeck');
    fanDeck.innerHTML = '';

    const totalCards = Math.min(deck.length, 35);
    const topCount = Math.floor(totalCards * 0.45);  // 上排少点
    const bottomCount = totalCards - topCount;        // 下排多点

    const cardWidth = 72;
    const overlap = 36;
    const maxAngle = 45;

    // 创建上排容器
    const topRow = document.createElement('div');
    topRow.className = 'fan-row fan-row-top';
    fanDeck.appendChild(topRow);

    // 创建下排容器
    const bottomRow = document.createElement('div');
    bottomRow.className = 'fan-row fan-row-bottom';
    fanDeck.appendChild(bottomRow);

    // 渲染单排扇形的辅助函数
    function renderRow(rowEl, count, startIdx, isTop) {
        if (count <= 0) return;

        const angleStep = count > 1 ? (maxAngle * 2) / (count - 1) : 0;
        const startAngle = -maxAngle;

        const totalWidth = (count - 1) * (cardWidth - overlap) + cardWidth;
        const containerWidth = fanDeck.offsetWidth || 500;
        const scale = Math.min(1, (containerWidth - 20) / totalWidth);

        const startX = -(totalWidth * scale) / 2 + (cardWidth * scale) / 2;

        for (let i = 0; i < count; i++) {
            const cardEl = document.createElement('div');
            cardEl.className = 'fan-card';

            const angle = startAngle + i * angleStep;
            const arcOffset = Math.pow(Math.abs(angle) / maxAngle, 2) * (isTop ? 6 : 4);

            const x = startX + i * (cardWidth - overlap) * scale;

            const baseTransform = `translateX(${x}px) rotate(${angle}deg) translateY(-${arcOffset}px) scale(${scale})`;
            cardEl.style.setProperty('--base-transform', baseTransform);
            cardEl.style.transform = baseTransform;
            cardEl.style.zIndex = i + (isTop ? 0 : 50);
            cardEl.style.left = `calc(50% - ${cardWidth * scale / 2}px)`;

            const deckIdx = startIdx + i;
            cardEl.dataset.cardIndex = deckIdx;

            cardEl.addEventListener('click', function(e) {
                e.stopPropagation();
                selectFanCard(this, parseInt(this.dataset.cardIndex));
            });

            cardEl.addEventListener('touchstart', function(e) {
                document.querySelectorAll('.fan-card.touch-hover').forEach(c => c.classList.remove('touch-hover'));
                this.classList.add('touch-hover');
            }, {passive: true});

            cardEl.addEventListener('touchend', function() {
                setTimeout(() => this.classList.remove('touch-hover'), 200);
            }, {passive: true});

            rowEl.appendChild(cardEl);
        }
    }

    renderRow(topRow, topCount, 0, true);
    renderRow(bottomRow, bottomCount, topCount, false);

    console.log(`双扇形渲染: 上排${topCount}张 + 下排${bottomCount}张 = ${totalCards}张`);
}

function selectFanCard(cardEl, deckIndex) {
    if (drawnCards.length >= selectedSpread) return;
    if (cardEl.classList.contains('selected')) return;

    // 从deck中取出对应的牌
    const card = deck[deckIndex];
    // 从deck中移除这张牌
    deck.splice(deckIndex, 1);
    const reversed = Math.random() < 0.15;

    drawnCards.push({ data: card, reversed: reversed, position: drawnCards.length });

    // 动画效果
    cardEl.classList.add('selected');
    cardEl.classList.add('shimmer');
    playDrawSound();
    vibrate(40);

    const rect = cardEl.getBoundingClientRect();
    createSparkles(rect.left + rect.width/2, rect.top + rect.height/2);

    // 更新进度
    document.getElementById('drawProgress').textContent = `已选 ${drawnCards.length} / ${selectedSpread} 张`;

    // 添加到底部已选牌展示
    const display = document.getElementById('drawnCardsDisplay');
    const mini = document.createElement('div');
    mini.className = `drawn-card-mini ${reversed ? 'reversed' : ''}`;
    mini.innerHTML = `<span class="mini-emoji">${card.emoji}</span><span class="mini-name">${card.name}</span>`;
    display.appendChild(mini);

    // 更新提示文字
    const instructions = [
        '✨ 第一张牌已选中，继续选择 ✨',
        '✨ 能量正在汇聚，再选一张 ✨',
        '✨ 命运之网正在编织 ✨',
        '✨ 牌阵即将完成 ✨',
        '✨ 再选一张，答案即将揭晓 ✨',
        '✨ 最后一张，完整你的牌阵 ✨'
    ];
    document.getElementById('drawInstruction').textContent = instructions[Math.min(drawnCards.length - 1, instructions.length - 1)];

    // 延迟后重新渲染扇形（移除已选中的牌）
    setTimeout(() => {
        if (drawnCards.length < selectedSpread) {
            renderFanDeck();
        } else {
            // 全部选完
            document.getElementById('fanDeck').innerHTML = '';
            document.getElementById('drawInstruction').textContent = '✨ 选牌完成，准备解读 ✨';
            vibrate([100, 50, 100, 50, 100]);
            setTimeout(showSpread, 1000);
        }
    }, 600);
}

function showReading() {
    document.getElementById('spreadDisplay').style.display = 'none';
    document.getElementById('readingSection').classList.add('active');

    const topicName = selectedTopic.length > 10 ? selectedTopic.substring(0, 10) + '...' : selectedTopic;
    document.getElementById('readingTitle').textContent = `✨ ${selectedSpread}张牌阵 · ${topicName} ✨`;

    const container = document.getElementById('readingsContainer');
    container.innerHTML = '';

    const positions = selectedSpread === 3 ? spread3Positions : spread6Positions;

    drawnCards.forEach((card, i) => {
        const reading = generateReading(card, positions[i], i);

        div.className = 'card-reading';

// 生成单张牌解读
function generateReading(card, position, index) {
    const { data, reversed } = card;
    const topic = selectedTopic;
    let reading = '';

    let baseMeaning = getCardSpecificMeaning(data, reversed);
    reading += `<p><span class="highlight">【牌面核心】</span>${baseMeaning}</p>`;

    reading += `<p style="margin-top: 10px;"><span class="highlight">【在此位置】</span>`;
    reading += getPositionMeaning(data, position, reversed, topic, index);
    reading += `</p>`;

    reading += `<p style="margin-top: 10px;"><span class="highlight">【行动指引】</span>`;
    reading += getActionGuidance(data, reversed, topic, position);
    reading += `</p>`;

    return reading;
}

// 生成综合总结
function generateSummary() {
    const topic = selectedTopic;
    const positions = selectedSpread === 3 ? spread3Positions : spread6Positions;

    let summaryHTML = '<h3>🌙 综合指引</h3>';

    // 生成故事线
    const storyLines = [
        `关于「${topic}」，你的牌阵讲述了一个从${positions[0]}到${positions[positions.length-1]}的旅程。`,
        `这${selectedSpread}张牌共同描绘了一幅图景：你的${topic}正在经历一次重要的能量转换。`,
        `牌阵的整体信息显示：你的${topic}课题正处于一个关键的转折点。`
    ];
    summaryHTML += `<p>${storyLines[Math.floor(Math.random() * storyLines.length)]}</p>`;

    // 核心主题分析
    const majorCount = drawnCards.filter(c => c.data.id < 22).length;
    const reversedCount = drawnCards.filter(c => c.reversed).length;
    const suits = {};
    drawnCards.forEach(c => {
        const suit = c.data.suit || '大阿卡纳';
        suits[suit] = (suits[suit] || 0) + 1;
    });
    const dominantSuit = Object.entries(suits).sort((a, b) => b[1] - a[1])[0];

    summaryHTML += '<p style="margin-top:12px;"><span class="highlight">【能量分析】</span>';

    if (majorCount >= 2) {
        summaryHTML += `牌阵中出现${majorCount}张大阿卡纳，显示这是一个重要的生命课题，而非日常琐事。宇宙正在通过这个课题推动你的灵魂成长。`;
    } else {
        summaryHTML += `牌阵以小阿卡纳为主，显示这是一个可以通过具体行动改善的日常情境。你有能力直接影响结果。`;
    }

    if (reversedCount >= 2) {
        summaryHTML += ` ${reversedCount}张逆位牌暗示：当前的主要阻碍来自内在——可能是恐惧、旧模式或未处理的情绪。外在的改变需要先内在开始。`;
    } else if (reversedCount === 0) {
        summaryHTML += ` 全部正位显示：能量流动顺畅，这是一个积极行动的好时机。`;
    } else {
        summaryHTML += ` 1张逆位牌是一个温和的提醒——某个领域需要额外的觉察，但不是严重的阻碍。`;
    }

    if (dominantSuit && dominantSuit[0] !== '大阿卡纳') {
        const suitMeanings = {
            '权杖': '行动、热情与创造',
            '圣杯': '情感、关系与直觉',
            '宝剑': '思维、 clarity 与决策',
            '星币': '物质、安全与务实'
        };
        summaryHTML += ` ${dominantSuit[0]}牌的主导显示：当前的核心议题围绕「${suitMeanings[dominantSuit[0]]}」展开。`;
    }

    summaryHTML += '</p>';

    // 牌与牌之间的关系
    if (drawnCards.length >= 2) {
        summaryHTML += '<p style="margin-top:12px;"><span class="highlight">【牌阵对话】</span>';
        const firstCard = drawnCards[0].data.name;
        const lastCard = drawnCards[drawnCards.length-1].data.name;
        summaryHTML += `从${firstCard}到${lastCard}，牌阵展示了一条转化之路。起点暗示了你从哪里来，终点暗示你可能往哪里去——但记得，路径上的每一步都是你当下选择的累积。`;
        summaryHTML += '</p>';
    }

    // 具体建议
    summaryHTML += '<p style="margin-top:12px;"><span class="highlight">【本周实践】</span>';
    const practices = [
        `每天花5分钟回顾这个牌阵，问自己：今天我可以在${topic}领域做出什么小改变？`,
        `写下这个牌阵中让你印象最深的牌，贴在显眼处。让它成为你本周的「能量锚点」。`,
        `选择一个牌阵中的行动建议，在本周内实践。塔罗的价值不在预测，而在激活你的觉察与行动。`,
        `与一个信任的人分享这个牌阵的某个洞见。说出来，会让理解更深。`
    ];
    summaryHTML += practices[Math.floor(Math.random() * practices.length)];
    summaryHTML += '</p>';

    // 结束语
    summaryHTML += `
        <div style="margin-top:16px;padding:14px;background:rgba(255,255,255,0.05);border-radius:14px;text-align:center;">
            <p style="font-style:italic;color:#ffd0e8;line-height:1.8;">
                ✨ 塔罗给出的不是命令，而是觉醒。<br>
                真正决定未来的人，始终是你自己。<br>
                愿你在${topic}的旅程中，找到属于自己的光 ✨
            </p>
        </div>
    `;

    document.getElementById('summaryReading').innerHTML = summaryHTML;
}

        background: rgba(0,0,0,0.85);
        color: white;
        padding: 12px 24px;
        border-radius: 24px;
        font-size: 14px;
        z-index: 1000;
        animation: fadeIn 0.3s ease;

    setTimeout(() => {

// 抽牌时的音效提示（使用Web Audio API生成简单音效）
function playDrawSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        oscillator.frequency.exponentialRampToValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5

        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.3);
    } catch(e) {
        // 音频播放失败时静默处理
    }
}

// 洗牌时的音效
function playShuffleSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);

        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.1;
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;

        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

        noise.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        noise.start();
    } catch(e) {
        // 音频播放失败时静默处理
    }
}

let ticking = false;
window.addEventListener('scroll', function() {
    if (!ticking) {
        window.requestAnimationFrame(function() {
            const scrolled = window.pageYOffset;
            const particles = document.querySelectorAll('.particle');
            particles.forEach((p, i) => {
                const speed = 0.5 + (i % 3) * 0.2;
                p.style.transform = `translateY(${scrolled * speed}px)`;
            });
            ticking = false;
        });
        ticking = true;
    }
}, {passive: true});

// 页面加载完成后的初始化
document.addEventListener('DOMContentLoaded', function() {
    // 预加载音频上下文（解决某些浏览器需要用户交互才能播放音频的问题）
    document.body.addEventListener('click', function initAudio() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        } catch(e) {}
        document.body.removeEventListener('click', initAudio);
    }, { once: true });

    // 检测是否为移动设备
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (isMobile) {
        document.body.classList.add('mobile');
    }

    // 性能优化：使用 Intersection Observer 懒加载动画
    const observerOptions = {
        root: null,
        rootMargin: '50px',
        threshold: 0.1
    };

    const animationObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.animationPlayState = 'running';
            } else {
                entry.target.style.animationPlayState = 'paused';
            }
        });
    }, observerOptions);

    // 观察所有动画元素
    setTimeout(() => {
        document.querySelectorAll('.particle, .deck-card, .final-card').forEach(el => {
            animationObserver.observe(el);
        });
    }, 1000);
});
